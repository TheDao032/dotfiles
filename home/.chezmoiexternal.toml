# External sources chezmoi pulls + manages at apply-time.
# https://www.chezmoi.io/reference/special-files-and-directories/chezmoiexternal-format/
#
# gpakosz/.tmux is a curated tmux framework. We pull it as an archive and
# overlay it under ~/.config/tmux/ at apply time. The user-customization
# file (tmux.conf.local) lives in this repo and IS NOT overwritten by the
# external (gpakosz's archive doesn't include a tmux.conf.local — it ships
# tmux.conf.local.example which we ignore).
#
# Refresh interval: weekly. Run `chezmoi apply --refresh-externals` to
# force-refresh sooner.

[".config/tmux"]
    type   = "archive"
    url    = "https://github.com/gpakosz/.tmux/archive/refs/heads/master.tar.gz"
    stripComponents = 1
    refreshPeriod   = "168h"
    # exact=false means chezmoi doesn't delete other files in this dir.
    # Critical: our own tmux.conf.local (managed by chezmoi from this repo)
    # must NOT be touched by the external.
    exact  = false
    # `exclude` is the top-level field on the External struct (not filter.exclude —
    # that's a different feature for piping content through an external command).
    #
    # CRITICAL: patterns are matched against the FULL archive path (including the
    # archive-root dir, e.g. ".tmux-master/README.md") BEFORE stripComponents is
    # applied. Use `**/` prefix to match at any depth.
    # https://github.com/twpayne/chezmoi/blob/master/internal/chezmoi/sourcestate.go
    exclude = [
        "**/README.md",
        "**/LICENSE.MIT",
        "**/LICENSE.WTFPLv2",
        "**/.gitignore",
        "**/.gitattributes",
        "**/.github",
        "**/.logo",
        "**/.tmux.conf.local",       # gpakosz's example .local — we use our own (non-dot)
        "**/tmux.conf.local",        # belt-and-braces if upstream renames
        "**/tmux.conf.local.example",
        "**/install.sh",
        "**/screenshots",
    ]
